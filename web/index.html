<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>midiremap — drum engine MIDI remapper</title>
<style>
  :root { color-scheme: dark; }
  body { font: 15px/1.5 system-ui, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 16px;
         background: #14161a; color: #e6e6e6; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #8a93a0; margin-top: 0; }
  .row { display: flex; gap: 12px; align-items: center; margin: 14px 0; flex-wrap: wrap; }
  label { color: #b7c0cc; min-width: 64px; }
  select, button { font: inherit; padding: 6px 10px; border-radius: 6px;
                   border: 1px solid #2c313a; background: #1c2026; color: #e6e6e6; }
  button { background: #2d6cdf; border-color: #2d6cdf; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  #drop { border: 2px dashed #2c313a; border-radius: 10px; padding: 28px; text-align: center;
          color: #8a93a0; margin: 16px 0; }
  #drop.over { border-color: #2d6cdf; color: #e6e6e6; }
  pre { background: #1c2026; border: 1px solid #2c313a; border-radius: 8px; padding: 12px;
        overflow: auto; white-space: pre-wrap; }
  .ok { color: #4ec9b0; } .warn { color: #e0a44e; } .err { color: #e06c75; }
  a.dl { color: #6db3ff; }
  details { margin: 10px 0; } textarea { width: 100%; min-height: 80px; background: #1c2026;
            color: #e6e6e6; border: 1px solid #2c313a; border-radius: 6px; font: 13px monospace; }
</style>
</head>
<body>
  <h1>midiremap</h1>
  <p class="sub">Convert a drum <code>.mid</code> from one sample engine's note layout to another. Runs entirely in your browser.</p>

  <div class="row">
    <label for="src">From</label>
    <select id="src"></select>
    <label for="tgt">To</label>
    <select id="tgt"></select>
  </div>

  <div id="drop">Drop a <code>.mid</code> file here, or <input type="file" id="file" accept=".mid,.midi" /></div>

  <details>
    <summary>Optional: custom / override engine map (JSON)</summary>
    <p class="sub">Same schema as the built-in TOML maps. Adds a new engine id or overrides an existing one for this conversion.</p>
    <textarea id="usermap" placeholder='{"id":"my_kit","name":"My Kit","notes":[{"note":36,"canon":"KickMain","primary":true}]}'></textarea>
  </details>

  <div class="row">
    <button id="go" disabled>Convert</button>
    <span id="status" class="sub"></span>
  </div>

  <div id="out"></div>

<script type="module">
import init, { remap, list_engines } from './pkg/midiremap_wasm.js';

const srcSel = document.getElementById('src');
const tgtSel = document.getElementById('tgt');
const fileIn = document.getElementById('file');
const drop   = document.getElementById('drop');
const go      = document.getElementById('go');
const status  = document.getElementById('status');
const out      = document.getElementById('out');
const userMap = document.getElementById('usermap');

let inputBytes = null;
let inputName  = 'drums';

function fillEngines(ids) {
  for (const sel of [srcSel, tgtSel]) {
    sel.innerHTML = '';
    for (const id of ids) {
      const o = document.createElement('option');
      o.value = id; o.textContent = id;
      sel.appendChild(o);
    }
  }
  if (ids.length > 1) tgtSel.selectedIndex = 1; // default to a different target
}

function setStatus(msg, cls = 'sub') { status.className = cls; status.textContent = msg; }

async function loadFile(file) {
  inputName = file.name.replace(/\.midi?$/i, '');
  inputBytes = new Uint8Array(await file.arrayBuffer());
  go.disabled = false;
  setStatus(`loaded ${file.name} (${inputBytes.length} bytes)`, 'ok');
}

fileIn.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function renderReport(report) {
  const lines = [];
  const section = (title, obj, cls) => {
    const keys = Object.keys(obj || {});
    if (!keys.length) return;
    lines.push(`<div class="${cls}">${title}:</div>`);
    for (const k of keys) lines.push(`  ${k}: ${obj[k]}`);
  };
  section('Unmapped source notes (dropped)', report.unmapped_source, 'warn');
  section('Approximated via fallback', report.fallback_used, 'warn');
  section('Dropped (no target + no fallback)', report.dropped, 'err');
  return lines.length ? `<pre>${lines.join('\n')}</pre>` : '<p class="ok">Clean — nothing lost or approximated.</p>';
}

go.addEventListener('click', () => {
  if (!inputBytes) return;
  out.innerHTML = '';
  try {
    const um = userMap.value.trim();
    const res = remap(inputBytes, srcSel.value, tgtSel.value, um || undefined);
    const bytes = new Uint8Array(res.bytes);
    const blob = new Blob([bytes], { type: 'audio/midi' });
    const url = URL.createObjectURL(blob);
    const name = `${inputName}-${tgtSel.value}.mid`;
    setStatus(`converted → ${bytes.length} bytes`, 'ok');
    out.innerHTML =
      `<p><a class="dl" href="${url}" download="${name}">⬇ download ${name}</a></p>` +
      renderReport(res.report);
  } catch (err) {
    setStatus('', 'sub');
    out.innerHTML = `<p class="err">Error: ${err}</p>`;
  }
});

init().then(() => {
  fillEngines(list_engines());
  setStatus('ready — pick engines and drop a file', 'sub');
}).catch(err => setStatus(`failed to load wasm: ${err}`, 'err'));
</script>
</body>
</html>
